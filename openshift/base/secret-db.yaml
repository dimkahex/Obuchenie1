# В продакшене создавайте секреты через oc create secret или sealed-secrets
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  labels:
    app: microservices-demo
type: Opaque
stringData:
  postgres-users-password: "userspass"
  postgres-catalog-password: "catalogpass"
  postgres-orders-password: "orderspass"
  postgres-users-url: "postgres://users:userspass@postgres-users:5432/users"
  postgres-catalog-url: "postgres://catalog:catalogpass@postgres-catalog:5432/catalog"
  postgres-orders-url: "postgres://orders:orderspass@postgres-orders:5432/orders"
  jwt-secret: "change-me-in-production-secret-key"
  redis-url: "redis://redis:6379"
  redis-password: ""
