apiVersion: v1
kind: Service
metadata:
  name: postgres-users
  labels:
    app: postgres-users
spec:
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres-users
  type: ClusterIP
---
